<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVE Options Matrix · Ultimate Multi-Scan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
:root { --bg:#0a0a0f;--panel:#111118;--panel2:#16161f;--border:#1e1e2e;--gold:#f5c842;--gold-dim:rgba(245,200,66,0.12);--green:#00e676;--green-dim:rgba(0,230,118,0.12);--red:#ff4444;--red-dim:rgba(255,68,68,0.12);--blue:#4fc3f7;--blue-dim:rgba(79,195,247,0.12);--text:#e8e8f0;--text2:#9090a8; }
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--panel);}
.logo{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--gold);}
.layout{display:grid;grid-template-columns:1fr 340px;height:calc(100vh - 53px);}
.chart-container { flex:1; width:100%; height:100%; position:relative; background:#000; }
.sidebar{border-left:1px solid var(--border);background:var(--panel);padding:18px;overflow-y:auto;}
.asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 20px; }
.asset-btn { padding: 8px; background: var(--panel2); border: 1px solid var(--border); color: var(--text2); font-family: 'Space Mono', monospace; font-size: 11px; font-weight:700; cursor: pointer; border-radius: 4px; }
.asset-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.tg-input { width: 100%; background: var(--panel2); border: 1px solid var(--border); border-radius: 4px; padding: 8px; color: var(--text); font-size: 11px; margin-bottom: 5px; }
.multi-panel-table { width: 100%; border-collapse: collapse; font-family: 'Space Mono', monospace; font-size: 11px; }
.multi-panel-table td { padding: 8px; border-bottom: 1px solid var(--border); }
.badge-dir { padding: 2px 6px; border-radius: 4px; font-weight: 700; font-size: 10px; }
.badge-dir.buy { background: var(--green-dim); color: var(--green); }
.badge-dir.sell { background: var(--red-dim); color: var(--red); }
</style>
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<div class="header">
  <div class="logo">◈ TVE ULTIMATE SCANNER</div>
  <div id="lastUpdate" style="font-size:10px; color:var(--text2);">เชื่อมต่อระบบ...</div>
</div>

<div class="layout">
  <div class="chart-container" id="tv_chart_container"></div>
  <div class="sidebar">
    <div class="asset-grid" id="assetGrid"></div>
    <input type="text" id="userTgToken" class="tg-input" placeholder="Bot Token...">
    <input type="text" id="userTgChatId" class="tg-input" placeholder="Chat ID...">
    <button style="width:100%; padding:8px; background:var(--blue); border:none; cursor:pointer; font-weight:700; border-radius:4px;" onclick="saveKeys()">SAVE SETTINGS</button>
    <table class="multi-panel-table" style="margin-top:20px;">
      <tbody id="multiAssetTableBody"></tbody>
    </table>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
  
  const db = getDatabase(initializeApp({
    apiKey: "AIzaSyCLq0sx9CBR-SceGR0y61dE9iWmkBsGLck",
    databaseURL: "https://option-tvesignal-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "option-tvesignal"
  }));

  const assetMap = {
    XAUUSD: { tv:"FX_IDC:XAUUSD", binance:"PAXGUSDT", active:true, name:"💰 XAUUSD" },
    BTCUSD: { tv:"BINANCE:BTCUSDT", binance:"BTCUSDT", active:true, name:"₿ BTCUSD" },
    ETHUSD: { tv:"BINANCE:ETHUSDT", binance:"ETHUSDT", active:false, name:"♦ ETHUSD" },
    SOLUSD: { tv:"BINANCE:SOLUSDT", binance:"SOLUSDT", active:false, name:"🪙 SOLUSD" },
    EURUSD: { tv:"FX:EURUSD", binance:"EURUSDT", active:false, name:"🇪🇺 EURUSD" },
    GBPUSD: { tv:"FX:GBPUSD", binance:"GBPUSDT", active:false, name:"🇬🇧 GBPUSD" },
    USDJPY: { tv:"FX:USDJPY", binance:"USDJPY", active:false, name:"🇯🇵 USDJPY" },
    AUDUSD: { tv:"FX:AUDUSD", binance:"AUDUSDT", active:false, name:"🇦🇺 AUDUSD" }
  };

  let chartFocus = 'XAUUSD';

  window.saveKeys = () => {
    localStorage.setItem('tve_user_token', document.getElementById('userTgToken').value);
    localStorage.setItem('tve_user_chatid', document.getElementById('userTgChatId').value);
    alert("บันทึกค่าเรียบร้อย");
  };

  function analyze(klines) {
    if (!klines || klines.length < 30) return 'hold';
    const close = klines.map(c => parseFloat(c[4]));
    const len = close.length;
    const calcEMA = (p, n) => { let k=2/(n+1), ema=p[0]; for(let i=1;i<len;i++) ema=p[i]*k+ema*(1-k); return ema; };
    const ema50 = calcEMA(close, 50), ema9 = calcEMA(close, 9), ema21 = calcEMA(close, 21);
    
    let gains=0, losses=0;
    for(let i=len-14; i<len; i++) { let d=close[i]-close[i-1]; if(d>0) gains+=d; else losses-=d; }
    const rsi = 100 - (100/(1+(gains/14)/(losses/14)));

    if (close[len-1] > ema50 && ema9 > ema21 && rsi > 50) return 'buy';
    if (close[len-1] < ema50 && ema9 < ema21 && rsi < 50) return 'sell';
    return 'hold';
  }

  async function scanner() {
    const tbody = document.getElementById('multiAssetTableBody');
    tbody.innerHTML = '';
    for (const [key, asset] of Object.entries(assetMap)) {
      if (!asset.active) continue;
      try {
        const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${asset.binance};interval=1m&limit=60`);
        const klines = await r.json();
        const dir = analyze(klines);
        tbody.innerHTML += `<tr><td style="color:var(--blue); cursor:pointer;" onclick="chartFocus='${key}'; initChart()">🔗 ${asset.name}</td><td>${dir}</td></tr>`;
        if (dir !== 'hold') {
            const tok = localStorage.getItem('tve_user_token'), cid = localStorage.getItem('tve_user_chatid');
            if(tok && cid) fetch(`https://api.telegram.org/bot${tok}/sendMessage?chat_id=${cid}&text=SIGNAL: ${asset.name} IS ${dir}`);
        }
      } catch(e) {}
    }
  }

  window.initChart = () => {
    new TradingView.widget({"width":"100%","height":"100%","symbol":assetMap[chartFocus].tv,"interval":"1","container_id":"tv_chart_container","theme":"dark"});
  };

  // Init
  Object.keys(assetMap).forEach(k => {
    document.getElementById('assetGrid').innerHTML += `<button class="asset-btn ${assetMap[k].active?'active':''}" onclick="assetMap['${k}'].active=!assetMap['${k}'].active; this.classList.toggle('active'); scanner();">${assetMap[k].name}</button>`;
  });
  
  document.getElementById('userTgToken').value = localStorage.getItem('tve_user_token') || '';
  document.getElementById('userTgChatId').value = localStorage.getItem('tve_user_chatid') || '';
  initChart();
  setInterval(scanner, 15000);
</script>
</body>
</html>
