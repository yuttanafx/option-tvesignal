<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>TVE Ultra Terminal · Advanced Matrix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Space+Mono&display=swap');
        :root { --bg:#0a0a0f; --panel:#111118; --gold:#f5c842; --green:#00e676; --red:#ff4444; --border:#1e1e2e; --text:#e8e8f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; margin: 0; }
        .layout { display: grid; grid-template-columns: 1fr 350px; height: 100vh; }
        .panel { padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; }
        .badge-dir { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .buy { background: rgba(0,230,118,0.2); color: var(--green); }
        .sell { background: rgba(255,68,68,0.2); color: var(--red); }
        .hold { background: #333; color: #888; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 10px; border-bottom: 1px solid var(--border); font-family: 'Space Mono'; font-size: 12px; }
    </style>
</head>
<body>

<div class="layout">
    <div class="chart-area" id="tv_chart_container"></div>
    <div class="panel">
        <h3>TVE ULTRA MATRIX</h3>
        <div id="lastUpdate">กำลังโหลดระบบ...</div>
        <table id="signalTable">
            <thead><tr><th>คู่เงิน</th><th>ราคา</th><th>สถานะ / แรงส่ง</th></tr></thead>
            <tbody id="multiAssetTableBody"></tbody>
        </table>
        <button onclick="runMultiScanner()" style="margin-top:20px; width:100%; padding:10px; cursor:pointer;">FORCE SCAN</button>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    const assetMap = {
        XAUUSD: { binanceSymbol: "PAXGUSDT", name: "XAUUSD" },
        BTCUSD: { binanceSymbol: "BTCUSDT", name: "BTCUSD" },
        ETHUSD: { binanceSymbol: "ETHUSDT", name: "ETHUSD" }
    };

    const Indicators = {
        getMACD: (data) => {
            const close = data.map(k => parseFloat(k[4]));
            const ema = (arr, p) => arr.reduce((acc, val) => acc + (val - acc) * (2 / (p + 1)), arr[0]);
            return (ema(close, 12) - ema(close, 26)); 
        },
        getBB: (data) => {
            const close = data.map(k => parseFloat(k[4]));
            const sma = close.slice(-20).reduce((a,b) => a+b, 0) / 20;
            const stdDev = Math.sqrt(close.slice(-20).map(x => Math.pow(x - sma, 2)).reduce((a,b) => a+b, 0) / 20);
            return { mid: sma, upper: sma + (2*stdDev), lower: sma - (2*stdDev) };
        }
    };

    async function runMultiScanner() {
        const tbody = document.getElementById('multiAssetTableBody');
        let htmlBuffer = "";

        for (const [key, info] of Object.entries(assetMap)) {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${info.binanceSymbol}&interval=5m&limit=30`);
            const klines = await res.json();
            const price = parseFloat(klines[klines.length - 1][4]);
            
            const macd = Indicators.getMACD(klines);
            const bb = Indicators.getBB(klines);
            
            // Logic: MACD > 0 + ราคาอยู่เหนือเส้นกลาง BB = Buy
            let strength = (macd > 0 ? 50 : 0) + (price > bb.mid ? 40 : 0);
            let dir = strength > 70 ? 'buy' : (strength < 30 ? 'sell' : 'hold');

            htmlBuffer += `<tr>
                <td>${info.name}</td>
                <td>$${price.toFixed(2)}</td>
                <td>
                    <span class="badge-dir ${dir}">${dir.toUpperCase()}</span>
                    <div style="width:50px; background:#222; display:inline-block; height:5px;"><div style="width:${strength}%; background:${strength>50?'var(--green)':'var(--red)'}; height:100%;"></div></div>
                </td>
            </tr>`;
        }
        tbody.innerHTML = htmlBuffer;
        document.getElementById('lastUpdate').textContent = 'ล่าสุด: ' + new Date().toLocaleTimeString();
    }

    // Initial Load
    runMultiScanner();
    setInterval(runMultiScanner, 15000);
</script>

</body>
</html>
